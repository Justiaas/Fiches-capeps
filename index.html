<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiches CAPEPS - Révision institutionnelle</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #475569;
      --border: #d6d3d1;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --accent: #1d4ed8;
      --accent-soft: #dbeafe;
      --accent-hero: linear-gradient(135deg, #dbeafe, #eff6ff);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8f5f0 0%, #f3efe8 100%);
      color: var(--text);
      line-height: 1.55;
    }

    .container {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }

    .hero {
      border-radius: 36px;
      padding: 34px;
      border: 1px solid color-mix(in srgb, var(--accent) 16%, white);
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      transition: background 0.25s ease;
      background: var(--accent-hero);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent) 14%, white);
      opacity: 0.8;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(15,23,42,0.12);
      font-size: 12px;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-end;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: clamp(30px, 5vw, 54px);
      margin: 0 0 8px;
      line-height: 1.03;
    }

    .subtitle {
      margin: 0;
      max-width: 980px;
      color: #334155;
      font-size: 15px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid color-mix(in srgb, var(--accent) 20%, #cbd5e1);
      border-radius: 16px;
      background: white;
      color: #0f172a;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.18s ease;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.04);
    }

    button:hover { transform: translateY(-1px); }

    .btn-solid {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .nav-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .layout-main {
      display: grid;
      grid-template-columns: 1fr 1.25fr;
      gap: 18px;
      margin-bottom: 18px;
      align-items: start;
    }

    .left-panel, .card, .step-box {
      border: 1px solid color-mix(in srgb, var(--accent) 16%, #d6d3d1);
      box-shadow: var(--shadow);
    }

    .left-panel {
      border-radius: 38px;
      padding: 26px;
      background: linear-gradient(180deg, var(--accent-soft) 0%, #ffffff 100%);
    }

    .left-panel h2, .card h2, .step-box h2 {
      margin: 0 0 14px;
      font-size: 26px;
      line-height: 1.15;
      color: #0f172a;
    }

    .left-panel p.intro {
      font-size: 15px;
      margin: 0 0 18px;
      color: #334155;
    }

    .card-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr 1fr;
      align-items: start;
    }

    .card {
      background: var(--card);
      border-radius: 28px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      min-height: 100%;
    }

    .card::before, .step-box::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 30%, white));
    }

    .double-grid, .steps-grid {
      display: grid;
      gap: 18px;
      margin-bottom: 18px;
    }

    .double-grid { grid-template-columns: 1fr 1fr; }
    .steps-grid { grid-template-columns: 0.95fr 1.05fr; }

    .step-box {
      border-radius: 34px;
      padding: 24px;
      background: white;
      position: relative;
      overflow: hidden;
    }

    .section-block {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid color-mix(in srgb, var(--accent) 20%, rgba(15,23,42,0.12));
    }

    .section-block:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .mini-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: 0.01em;
    }

    ul.clean {
      margin: 0;
      padding-left: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }

    ul.clean li {
      position: relative;
      padding: 0 0 0 18px;
      color: #334155;
      font-size: 15px;
    }

    ul.clean li::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      position: absolute;
      left: 0;
      top: 10px;
      opacity: 0.7;
    }

    .value-list li {
      padding: 10px 12px 10px 18px;
      border-radius: 14px;
      background: #fafafa;
      border: 1px solid color-mix(in srgb, var(--accent) 12%, #e2e8f0);
    }

    .value-list li.major {
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 22%, white), #fff);
      border-color: color-mix(in srgb, var(--accent) 32%, #cbd5e1);
      font-weight: 800;
      color: #0f172a;
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 16%, white);
    }

    .value-list li.secondary {
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 12%, white), #fff);
      font-weight: 600;
    }

    .value-list li strong {
      font-weight: 800;
      color: #0f172a;
    }

    .ref-list, .proto-list {
      display: grid;
      gap: 12px;
    }

    .ref-item, .proto-item {
      border: 1px solid color-mix(in srgb, var(--accent) 12%, #e2e8f0);
      border-radius: 16px;
      padding: 12px 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfb 100%);
    }

    .ref-item strong, .proto-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #0f172a;
    }

    .ref-item .apport, .proto-item .apport,
    .ref-item .details, .proto-item .details {
      font-size: 14px;
      color: #334155;
      margin-bottom: 8px;
    }

    .ref-item a {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      word-break: break-word;
      font-weight: 600;
    }

    .ref-item a:hover { text-decoration: underline; }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }

    .pill {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid color-mix(in srgb, var(--accent) 16%, rgba(15,23,42,0.12));
      font-size: 12px;
      color: #334155;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 13px;
      color: #64748b;
      text-align: center;
    }

    @media (max-width: 1080px) {
      .layout-main,
      .double-grid,
      .steps-grid,
      .card-grid {
        grid-template-columns: 1fr;
      }

      .hero { padding: 24px; }
      .left-panel, .card, .step-box { border-radius: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section id="hero" class="hero">
      <div class="badge">Fiches de révision CAPEPS — sources institutionnelles primaires</div>
      <div class="hero-top">
        <div>
          <h1 id="heroTitle">Discrimination</h1>
          <p id="heroSubtitle" class="subtitle"></p>
        </div>

      <div id="heroPills" class="pill-row"></div>
    </section>

    <nav id="nav" class="nav"></nav>

    <section class="layout-main">
      <article id="leftPanel" class="left-panel"></article>

      <div class="card-grid">
        <article id="explicationsCard" class="card"></article>
        <article id="textesCard" class="card"></article>
        <article id="valeursCard" class="card"></article>
        <article id="notionsCard" class="card"></article>
      </div>
    </section>

    <section class="double-grid">
      <article id="partenairesCard" class="card"></article>
      <article id="protocolesCard" class="card"></article>
    </section>

    <section class="steps-grid">

    </section>

    <section>
      <article id="longCard" class="step-box"></article>
    </section>

    <p class="footer-note">
      Règle de construction : 5 textes maximum par fiche, uniquement Code / BO / circulaire / note de service / charte officielle, avec date et document d'origine.
    </p>
  </div>

    let index = 0;

    const $ = (id) => document.getElementById(id);

    function renderBulletList(items) {
      return `<ul class="clean">${items.map(item => `<li>${item}</li>`).join("")}</ul>`;
    }

    function renderValueList(items) {
      return `<ul class="clean value-list">${items.map(item => {
        const parts = item.text.split(" : ");
        const head = parts.shift() || "";
        const tail = parts.join(" : ");
        return `<li class="${item.level || "normal"}"><strong>${head}${tail ? " :" : ""}</strong>${tail ? ` ${tail}` : ""}</li>`;
      }).join("")}</ul>`;
    }

    function renderRefList(items) {
      return `<div class="ref-list">${items.map(item => `
        <div class="ref-item">
          <strong>${item.label}</strong>
          <div class="apport">${item.apport}</div>
          <a href="${item.url}" target="_blank" rel="noreferrer">Voir le document d'origine</a>
        </div>`).join("")}</div>`;
    }

    function renderProtoList(items) {
      return `<div class="proto-list">${items.map(item => `
        <div class="proto-item">
          <strong>${item.label}</strong>
          <div class="apport">${item.apport}</div>
          <div class="details">${item.details}</div>
        </div>`).join("")}</div>`;
    }

    function renderPills(items) {
      return items.map(item => `<span class="pill">${item}</span>`).join("");
    }

    function applyTheme(fiche) {
      document.documentElement.style.setProperty("--accent", fiche.colors.accent);
      document.documentElement.style.setProperty("--accent-soft", fiche.colors.accentSoft);
      document.documentElement.style.setProperty("--accent-hero", fiche.colors.hero);
    }

    function render() {
      const fiche = fiches[index];
      applyTheme(fiche);

      $("heroTitle").textContent = fiche.titre;
      $("heroSubtitle").textContent = fiche.subtitle;
      $("heroPills").innerHTML = renderPills(fiche.pills);

      $("leftPanel").innerHTML = `
        <h2>1 — Définition, déclinaisons et liens avec l'EPS</h2>
        <p class="intro">${fiche.definition}</p>

        <div class="section-block">
          <h3 class="mini-title">Déclinaisons concrètes</h3>
          ${renderBulletList(fiche.declinaisons)}
        </div>

        <div class="section-block">
          <h3 class="mini-title">👉 En EPS</h3>
          ${renderBulletList(fiche.epsPoints)}
        </div>
      `;

      $("explicationsCard").innerHTML = `
        <h2>2 — Éléments explicatifs</h2>
        <div class="section-block">
          <h3 class="mini-title">Éléments à traiter pour réduire le problème</h3>
          ${renderBulletList(fiche.explicatifs)}
        </div>
      `;

      $("textesCard").innerHTML = `<h2>3 — Textes institutionnels et ce qu'ils apportent (5 max)</h2>${renderRefList(fiche.textes)}`;
      $("valeursCard").innerHTML = `<h2>4 — Valeurs de la République associées</h2>${renderValueList(fiche.valeurs)}`;
      $("notionsCard").innerHTML = `<h2>5 — Notions incontournables</h2>${renderBulletList(fiche.notions)}`;
      $("partenairesCard").innerHTML = `<h2>6 — Partenaires, référents et personnels ressources</h2>${renderBulletList(fiche.partenaires)}`;
      $("protocolesCard").innerHTML = `<h2>7 — Protocoles, instances et dispositifs</h2>${renderProtoList(fiche.protocoles)}`;
      $("courtCard").innerHTML = `<h2>8 — À court terme</h2>${renderBulletList(fiche.court)}`;
      $("moyenCard").innerHTML = `<h2>9 — À moyen terme</h2>${renderBulletList(fiche.moyen)}`;
      $("longCard").innerHTML = `<h2>10 — À long terme</h2>${renderBulletList(fiche.long)}`;

      document.querySelectorAll(".nav-btn").forEach((btn, i) => {
        btn.classList.toggle("active", i === index);
      });
    }

    function initNav() {
      $("nav").innerHTML = fiches.map((fiche, i) =>
        `<button class="nav-btn ${i === 0 ? "active" : ""}" data-index="${i}">${fiche.titre}</button>`
      ).join("");

      document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          index = Number(btn.dataset.index);
          render();
        });
      });
    }

    $("prevBtn").addEventListener("click", () => {
      index = (index - 1 + fiches.length) % fiches.length;
      render();
    });

    $("nextBtn").addEventListener("click", () => {
      index = (index + 1) % fiches.length;
      render();
    });

    initNav();
