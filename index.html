<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiches CAPEPS - Révision institutionnelle v2</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #475569;
      --border: #d6d3d1;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }
    .hero {
      border-radius: 34px;
      padding: 34px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      transition: background 0.25s ease;
    }
    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(15,23,42,0.12);
      font-size: 12px;
      margin-bottom: 14px;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    h1 {
      font-size: clamp(30px, 5vw, 52px);
      margin: 0 0 8px;
      line-height: 1.05;
    }
    .subtitle {
      margin: 0;
      max-width: 920px;
      color: var(--muted);
      font-size: 15px;
    }
    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      background: white;
      color: #0f172a;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.18s ease;
    }
    button:hover { transform: translateY(-1px); }
    .btn-solid { background: #0f172a; color: white; border-color: #0f172a; }
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }
    .nav-btn.active {
      background: #0f172a;
      color: white;
      border-color: #0f172a;
    }
    .layout-main {
      display: grid;
      grid-template-columns: 1.02fr 1.18fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .left-panel, .card, .step-box {
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .left-panel {
      border-radius: 38px;
      padding: 26px;
    }
    .left-panel h2, .card h2, .step-box h2 {
      margin: 0 0 14px;
      font-size: 26px;
      line-height: 1.15;
    }
    .left-panel p.intro {
      font-size: 15px;
      margin: 0 0 18px;
      color: #334155;
    }
    .side-note {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(15,23,42,0.12);
    }
    .card-grid {
      display: grid;
      gap: 18px;
    }
    .card {
      background: var(--card);
      border-radius: 28px;
      padding: 24px;
    }
    .double-grid, .steps-grid {
      display: grid;
      gap: 18px;
      margin-bottom: 18px;
    }
    .double-grid { grid-template-columns: 1fr 1fr; }
    .steps-grid { grid-template-columns: 0.9fr 1.1fr; }
    ul.clean {
      margin: 0;
      padding-left: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }
    ul.clean li {
      position: relative;
      padding-left: 18px;
      color: #334155;
      font-size: 15px;
    }
    ul.clean li::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(15,23,42,0.55);
      position: absolute;
      left: 0;
      top: 10px;
    }
    .ref-list, .proto-list {
      display: grid;
      gap: 12px;
    }
    .ref-item, .proto-item {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px 14px;
      background: #fafafa;
    }
    .ref-item strong, .proto-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }
    .ref-item .apport, .proto-item .apport,
    .ref-item .details, .proto-item .details {
      font-size: 14px;
      color: #334155;
      margin-bottom: 8px;
    }
    .ref-item a {
      color: #0f4c81;
      text-decoration: none;
      font-size: 13px;
      word-break: break-word;
    }
    .ref-item a:hover { text-decoration: underline; }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .pill {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(15,23,42,0.12);
      font-size: 12px;
      color: #334155;
    }
    .step-box {
      border-radius: 34px;
      padding: 24px;
      background: white;
    }
    .footer-note {
      margin-top: 20px;
      font-size: 13px;
      color: #64748b;
      text-align: center;
    }
    @media (max-width: 980px) {
      .layout-main, .double-grid, .steps-grid { grid-template-columns: 1fr; }
      .hero { padding: 24px; }
      .left-panel, .card, .step-box { border-radius: 26px; }
    }
  </style>
</head>

        valeurs: [

    let index = 0;
    const $ = (id) => document.getElementById(id);

    function renderBulletList(items) {
      return `<ul class="clean">${items.map(item => `<li>${item}</li>`).join("")}</ul>`;
    }

    function renderRefList(items) {
      return `<div class="ref-list">${items.map(item => `
        <div class="ref-item">
          <strong>${item.label}</strong>
          <div class="apport">${item.apport}</div>
          ${item.url ? `<a href="${item.url}" target="_blank" rel="noreferrer">Consulter le texte officiel</a>` : ""}
        </div>`).join("")}</div>`;
    }

    function renderProtoList(items) {
      return `<div class="proto-list">${items.map(item => `
        <div class="proto-item">
          <strong>${item.label}</strong>
          <div class="apport">${item.apport}</div>
          <div class="details">${item.details}</div>
        </div>`).join("")}</div>`;
    }

    function renderPills(items) {
      return items.map(item => `<span class="pill">${item}</span>`).join("");
    }

    function render() {
      const fiche = fiches[index];
      $("hero").style.background = fiche.colors.hero;
      $("heroTitle").textContent = fiche.titre;
      $("heroSubtitle").textContent = fiche.subtitle;
      $("heroPills").innerHTML = renderPills(fiche.pills);
      $("leftPanel").style.background = fiche.colors.left;
      $("leftPanel").innerHTML = `
        <h2>1 — Définitions précises et liens avec l'EPS</h2>
        <p class="intro">${fiche.definition}</p>
        <div class="side-note">
          <h3>👉 En EPS</h3>
          ${renderBulletList(fiche.epsPoints)}
        </div>`;
      $("textesCard").innerHTML = `<h2>2 — Textes institutionnels et ce qu'ils apportent (5 max)</h2>${renderRefList(fiche.textes)}`;
      $("valeursCard").innerHTML = `<h2>3 — Valeurs de la République associées</h2>${renderBulletList(fiche.valeurs)}`;
      $("notionsCard").innerHTML = `<h2>4 — Notions incontournables</h2>${renderBulletList(fiche.notions)}`;
      $("partenairesCard").innerHTML = `<h2>5 — Partenaires, référents et personnels ressources</h2>${renderBulletList(fiche.partenaires)}`;
      $("protocolesCard").innerHTML = `<h2>6 — Protocoles, instances et dispositifs</h2>${renderProtoList(fiche.protocoles)}`;
      $("courtCard").innerHTML = `<h2>7 — À court terme</h2>${renderBulletList(fiche.court)}`;
      $("moyenCard").innerHTML = `<h2>8 — À moyen terme</h2>${renderBulletList(fiche.moyen)}`;
      $("longCard").innerHTML = `<h2>9 — À long terme</h2>${renderBulletList(fiche.long)}`;
      document.querySelectorAll(".nav-btn").forEach((btn, i) => btn.classList.toggle("active", i === index));
    }

    function initNav() {
      $("nav").innerHTML = fiches.map((fiche, i) => `<button class="nav-btn ${i === 0 ? "active" : ""}" data-index="${i}">${fiche.titre}</button>`).join("");
      document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          index = Number(btn.dataset.index);
          render();
        });
      });
    }

    $("prevBtn").addEventListener("click", () => {
      index = (index - 1 + fiches.length) % fiches.length;
      render();
    });

    $("nextBtn").addEventListener("click", () => {
      index = (index + 1) % fiches.length;
      render();
    });

    initNav();
    render();
  </script>
</body>
